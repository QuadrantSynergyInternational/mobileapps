name: Repack and Release

on:
  workflow_dispatch:
    inputs:
      params:
        type: string
        description: Build Params (JSON) — include "platform" key (android | ios | both)
        required: true

jobs:
  # ── Android repack ──────────────────────────────────────────────────────────
  repack-android:
    name: Repack APK
    runs-on: macos-latest
    if: ${{ fromJSON(github.event.inputs.params).platform == 'android' || fromJSON(github.event.inputs.params).platform == 'both' }}
    steps:
      - name: Checkout Workflow Scripts
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4.4.0
        if: ${{ fromJSON(github.event.inputs.params).java != '' }}
        with:
          java-version: ${{ fromJSON(github.event.inputs.params).java }}
          distribution: corretto

      - name: Common Setup
        id: setup
        uses: ./.github/actions/repack-setup
        with:
          params: ${{ github.event.inputs.params }}
          platform: android
          run_id: ${{ github.run_id }}
          appcenter_secret: ${{ secrets.APPCENTER_SECRET }}
          appcenter_domain: ${{ secrets.APPCENTER_DOMAIN }}
          git_username: ${{ secrets.GIT_USERNAME }}
          git_password: ${{ secrets.GIT_PASSWORD }}

      - name: Repack and Sign APK
        env:
          CI: "true"
          WORK_DIR: ${{ github.workspace }}
          SOURCE_DIR: ${{ github.workspace }}/input
          BUNDLE_OUTPUT_DIR: ${{ github.workspace }}/bundle_output
          RELEASE_DOWNLOAD_DIR: ${{ github.workspace }}/release_download
          RELEASE_REPO: ${{ fromJSON(github.event.inputs.params).releaseRepo }}
          RELEASE_TAG: ${{ fromJSON(github.event.inputs.params).releaseTag }}
          APK_FILENAME: ${{ fromJSON(github.event.inputs.params).apkFilename || '*.apk' }}
          KEYSTORE_PATH: ${{ fromJSON(github.event.inputs.params).keystorePath }}
          KEYSTORE_PASSWORD: ${{ fromJSON(github.event.inputs.params).keystorePassword }}
          KEY_ALIAS: ${{ fromJSON(github.event.inputs.params).keyAlias }}
          KEY_PASSWORD: ${{ fromJSON(github.event.inputs.params).keyPassword }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          APP_VERSION: ${{ steps.setup.outputs.current-version }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ fromJSON(github.event.inputs.params).sentryProject || '' }}
        run: bash scripts/repack_android.sh

      - name: Upload to Release
        id: release
        uses: muhamad-rizki/action-gh-release@v3.0.1
        with:
          repository: ${{ fromJSON(github.event.inputs.params).releaseTo }}
          token: ${{ secrets.GH_PAT }}
          files: release_download/resigned-output.apk
          tag_name: "v${{ steps.setup.outputs.current-version }}-${{ fromJSON(github.event.inputs.params).configuration }}-${{ fromJSON(github.event.inputs.params).branch }}"
          body: "Repacked APK v${{ steps.setup.outputs.current-version }} (${{ fromJSON(github.event.inputs.params).configuration }})"
          body_path: ./input/${{ fromJSON(github.event.inputs.params).releasenote != '' && fromJSON(github.event.inputs.params).releasenote || 'releasenote.md' }}

      - name: Update DB
        run: |
          curl -s -L -X POST \
          -H "X-AppCenter-Secret: ${{ secrets.APPCENTER_SECRET }}" \
          https://${{ secrets.APPCENTER_DOMAIN }}/projects/${{ fromJSON(github.event.inputs.params).projectid }}/release?id=${{ steps.release.outputs.id }}

  # ── iOS repack ──────────────────────────────────────────────────────────────
  repack-ios:
    name: Repack IPA
    runs-on: macos-14
    if: ${{ fromJSON(github.event.inputs.params).platform == 'ios' || fromJSON(github.event.inputs.params).platform == 'both' }}
    steps:
      - name: Checkout Workflow Scripts
        uses: actions/checkout@v4

      - name: Common Setup
        id: setup
        uses: ./.github/actions/repack-setup
        with:
          params: ${{ github.event.inputs.params }}
          platform: ios
          run_id: ${{ github.run_id }}
          appcenter_secret: ${{ secrets.APPCENTER_SECRET }}
          appcenter_domain: ${{ secrets.APPCENTER_DOMAIN }}
          git_username: ${{ secrets.GIT_USERNAME }}
          git_password: ${{ secrets.GIT_PASSWORD }}

      - name: Clone Provision Repo
        run: |
          git clone --depth=1 --single-branch --branch=main \
            https://admindevopsqsi:${{ secrets.GH_PAT }}@github.com/admindevopsqsi/ios-provision.git \
            provision

      - name: Repack and Sign IPA
        env:
          CI: "true"
          WORK_DIR: ${{ github.workspace }}
          SOURCE_DIR: ${{ github.workspace }}/input
          PROVISION_DIR: ${{ github.workspace }}/provision
          BUNDLE_OUTPUT_DIR: ${{ github.workspace }}/bundle_output
          RELEASE_DOWNLOAD_DIR: ${{ github.workspace }}/release_download
          RELEASE_REPO: ${{ fromJSON(github.event.inputs.params).releaseRepo }}
          RELEASE_TAG: ${{ fromJSON(github.event.inputs.params).releaseTag }}
          IPA_FILENAME: ${{ fromJSON(github.event.inputs.params).ipaFilename || '*.ipa' }}
          PROJECT_ID: ${{ fromJSON(github.event.inputs.params).projectid }}
          PROVISION_FILE: ${{ fromJSON(github.event.inputs.params).provisionfile != '' && fromJSON(github.event.inputs.params).provisionfile || fromJSON(github.event.inputs.params).branch }}
          P12_PASSWORD: ${{ fromJSON(github.event.inputs.params).p12pass || '' }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          APP_VERSION: ${{ steps.setup.outputs.current-version }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ fromJSON(github.event.inputs.params).sentryProject || '' }}
        run: bash scripts/repack_ios.sh

      - name: Upload to Release
        id: release
        uses: muhamad-rizki/action-gh-release@v3.0.1
        with:
          repository: ${{ fromJSON(github.event.inputs.params).releaseTo }}
          token: ${{ secrets.GH_PAT }}
          files: |
            release_download/resigned-output.ipa
            release_download/manifest.plist
          tag_name: "v${{ steps.setup.outputs.current-version }}-${{ fromJSON(github.event.inputs.params).configuration }}-${{ fromJSON(github.event.inputs.params).branch }}"
          body: "Repacked IPA v${{ steps.setup.outputs.current-version }} (${{ fromJSON(github.event.inputs.params).configuration }})"
          body_path: ./input/${{ fromJSON(github.event.inputs.params).releasenote != '' && fromJSON(github.event.inputs.params).releasenote || 'releasenote.md' }}

      - name: Update DB
        run: |
          curl -s -L -X POST \
          -H "X-AppCenter-Secret: ${{ secrets.APPCENTER_SECRET }}" \
          https://${{ secrets.APPCENTER_DOMAIN }}/projects/${{ fromJSON(github.event.inputs.params).projectid }}/release?id=${{ steps.release.outputs.id }}
